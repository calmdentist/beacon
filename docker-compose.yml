version: '3.9'
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: beacon-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: beacon
    ports:
      - '5432:5432'
    volumes:
      - beacon_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d beacon']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  beacon_pg_data:
